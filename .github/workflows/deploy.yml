name: Build & Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: algo-backend
      CONTAINER_NAME: algo-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: meta
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${OWNER_LC}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -eu

          [ -n "$VPS_HOST" ] || { echo "Missing secret: VPS_HOST"; exit 1; }
          [ -n "$VPS_USER" ] || { echo "Missing secret: VPS_USER"; exit 1; }
          [ -n "$VPS_SSH_KEY" ] || { echo "Missing secret: VPS_SSH_KEY"; exit 1; }
          [ -n "$VPS_PORT" ] || { echo "Missing secret: VPS_PORT"; exit 1; }
          [ -n "$GHCR_PAT" ] || { echo "Missing secret: GHCR_PAT"; exit 1; }

      - name: Deploy to VPS with rollback
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: /home/${{ secrets.VPS_USER }}/algo-backend
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_OWNER: ${{ steps.meta.outputs.owner_lc }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DEPLOY_PATH,IMAGE_NAME,IMAGE_TAG,GHCR_OWNER,CONTAINER_NAME,GHCR_PAT
          script: |
            set -eu

            set_var() {
              KEY="$1"
              VALUE="$2"
              if grep -q "^${KEY}=" .env.deploy; then
                sed -i "s|^${KEY}=.*|${KEY}=${VALUE}|" .env.deploy
              else
                printf "%s=%s\n" "$KEY" "$VALUE" >> .env.deploy
              fi
            }

            rollback() {
              echo "Deployment failed. Rolling back to ${CURRENT_TAG}..."
              set_var BACKEND_TAG "$CURRENT_TAG"
              docker compose --env-file .env.deploy up -d backend
            }

            cd "$DEPLOY_PATH"

            test -f docker-compose.yml || {
              echo "docker-compose.yml not found in ${DEPLOY_PATH}"
              exit 1
            }

            test -f .env.deploy || {
              echo ".env.deploy not found in ${DEPLOY_PATH}"
              exit 1
            }

            test -f .env.runtime || {
              echo ".env.runtime not found in ${DEPLOY_PATH}"
              exit 1
            }

            CURRENT_TAG=$(grep '^BACKEND_TAG=' .env.deploy | cut -d '=' -f2 || true)
            CURRENT_TAG=${CURRENT_TAG:-latest}

            set_var GHCR_OWNER "$GHCR_OWNER"
            set_var IMAGE_NAME "$IMAGE_NAME"
            set_var CONTAINER_NAME "$CONTAINER_NAME"
            set_var BACKEND_TAG "$IMAGE_TAG"

            echo "Logging into GHCR..."
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin

            echo "Pulling image and starting backend..."
            if docker compose --env-file .env.deploy pull backend && \
               docker compose --env-file .env.deploy up -d backend; then
              ATTEMPTS=0
              while [ "$ATTEMPTS" -lt 20 ]; do
                STATUS=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$CONTAINER_NAME" 2>/dev/null || echo "missing")
                if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                  echo "Deployment successful"
                  exit 0
                fi
                ATTEMPTS=$((ATTEMPTS + 1))
                sleep 5
              done
            fi

            rollback
            exit 1
